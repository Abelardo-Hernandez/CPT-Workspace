<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Usuarios</title>
<link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
<link href="vendor/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">
                <i class="bi bi-bar-chart-line-fill"></i>
            </div>
            <div>
                <h4>Seguimiento</h4>
                <span>de Proyectos</span>
            </div>
        </div>

        <p class="menu-title">Navegación</p>

        <a id="menuDashboard" href="dashboard.html">
            <i class="bi bi-house-door-fill"></i> Dashboard
        </a>
        <a id="menuProyectos" href="proyectos.html">
            <i class="bi bi-folder-fill"></i> Proyectos
        </a>
        <a id="menuKPIs" href="kpis.html">
            <i class="bi bi-graph-up"></i> KPIs
        </a>
        <a id="menuReuniones" href="reuniones.html">
            <i class="bi bi-calendar-event-fill"></i> Reuniones
        </a>
        <a id="menuAreas" href="areas.html">
            <i class="bi bi-building-fill"></i> Áreas
        </a>
        <a id="menuUsuarios" href="usuarios.html">
            <i class="bi bi-people-fill"></i> Usuarios
        </a>
        <a class="logout" href="#" onclick="logout()">
            <i class="bi bi-box-arrow-left"></i> Salir
        </a>
    </aside>

    <main class="content">
        <header class="topbar">
            <div>
                <h2>USUARIOS</h2>
            </div>

            <div class="topbar-right">
                <i class="bi bi-calendar3"></i>
                <span id="fechaActual"></span>
            </div>
        </header>

        <section class="panel-card2 mt-4">
            <div>
                <h5 class="mb-3">Nuevo usuario</h5>

                <div class="row g-3">
                    <div class="col-md-3">
                        <input id="nombre" class="form-control" placeholder="Nombre completo">
                    </div>

                    <div class="col-md-2">
                        <input id="usuario" class="form-control" placeholder="Usuario">
                    </div>

                    <div class="col-md-2">
                        <input id="password" type="password" class="form-control" placeholder="Contrasena">
                    </div>

                    <div class="col-md-2">
                        <select id="rol" class="form-select">
                            <option value="administrador">Administrador</option>
                            <option value="colaborador">Colaborador</option>
                            <option value="consulta">Consulta</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <select id="area_id" class="form-select"></select>
                    </div>

                    <div class="col-md-1">
                        <button class="btn btn-primary w-100" onclick="crearUsuario()">
                            +
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="panel-card2 mt-4">
            <div>
                <h5 class="mb-3">Lista de usuarios</h5>

                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Usuario</th>
                                <th>Rol</th>
                                <th>Area</th>
                                <th>Activo</th>
                                <th class="text-center">Editar</th>
                            </tr>
                        </thead>
                        <tbody id="tablaUsuarios"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>

<div id="modalEditarUsuario" class="app-modal" aria-hidden="true">
    <div class="app-modal-backdrop" onclick="cerrarModalEditarUsuario()"></div>

    <section class="app-modal-panel" role="dialog" aria-modal="true" aria-labelledby="tituloModalEditarUsuario">
        <div class="app-modal-header">
            <div>
                <h5 id="tituloModalEditarUsuario">Editar usuario</h5>
                <p>Actualiza los datos de acceso y permisos del usuario.</p>
            </div>

            <button class="btn btn-light btn-sm" type="button" onclick="cerrarModalEditarUsuario()" aria-label="Cerrar">
                <i class="bi bi-x-lg"></i>
            </button>
        </div>

        <input id="editar_id" type="hidden">

        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">Nombre completo</label>
                <input id="editar_nombre" class="form-control" placeholder="Nombre completo">
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold">Usuario</label>
                <input id="editar_usuario" class="form-control" placeholder="Usuario">
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold">Nueva contrasena</label>
                <input id="editar_password" type="password" class="form-control" placeholder="Deja vacio para conservar la actual">
            </div>

            <div class="col-md-3">
                <label class="form-label fw-bold">Rol</label>
                <select id="editar_rol" class="form-select">
                    <option value="administrador">Administrador</option>
                    <option value="colaborador">Colaborador</option>
                    <option value="consulta">Consulta</option>
                </select>
            </div>

            <div class="col-md-3">
                <label class="form-label fw-bold">Activo</label>
                <select id="editar_activo" class="form-select">
                    <option value="1">Si</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-bold">Area</label>
                <select id="editar_area_id" class="form-select"></select>
            </div>
        </div>

        <div class="app-modal-actions app-modal-actions-between">
            <button class="btn btn-danger fw-bold" type="button" onclick="eliminarUsuario()">
                <i class="bi bi-trash3"></i> Eliminar usuario
            </button>

            <div class="d-flex gap-2">
                <button class="btn btn-light fw-bold" type="button" onclick="cerrarModalEditarUsuario()">Cancelar</button>
                <button class="btn btn-primary fw-bold" type="button" onclick="actualizarUsuario()">
                    Guardar cambios
                </button>
            </div>
        </div>
    </section>
</div>

<script src="js/main.js"></script>
<script src="js/usuarios.js"></script>
</body>
</html>
