<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reuniones</title>
<link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
<link href="vendor/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
<div class="layout">
    <!-- MENÚ LATERAL -->
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">
                <i class="bi bi-bar-chart-line-fill"></i>
            </div>
            <div>
                <h4>Seguimiento</h4>
                <span>de Proyectos</span>
            </div>
        </div>

        <p class="menu-title">Navegación</p>

        <a id="menuDashboard" href="dashboard.html">
            <i class="bi bi-house-door-fill"></i> Dashboard
        </a>
        <a id="menuProyectos" href="proyectos.html">
            <i class="bi bi-folder-fill"></i> Proyectos
        </a>
        <a id="menuKPIs" href="kpis.html">
            <i class="bi bi-graph-up"></i> KPIs
        </a>
        <a id="menuReuniones" href="reuniones.html">
            <i class="bi bi-calendar-event-fill"></i> Reuniones
        </a>
        <a id="menuAreas" href="areas.html">
            <i class="bi bi-building-fill"></i> Áreas
        </a>
        <a id="menuUsuarios" href="usuarios.html">
            <i class="bi bi-people-fill"></i> Usuarios
        </a>
        <a class="logout" href="#" onclick="logout()">
            <i class="bi bi-box-arrow-left"></i> Salir
        </a>
    </aside>

    <main class="content">
        <header class="topbar">
            <div>
                <h2>REUNIONES</h2>
            </div>

            <div class="topbar-right">
                <i class="bi bi-calendar3"></i>
                <span id="fechaActual"></span>
            </div>
        </header>

        <section class="panel-card2 mt-4">
            <div>

            <h5 class="mb-3">Nueva reunión</h5>

            <div class="row g-3">
            
                <div class="col-md-3">
                    <label class="form-label fw-bold">
                        Número de reunión
                    </label>
                
                    <input
                        id="numero_reunion"
                        type="number"
                        class="form-control"
                        placeholder="Ejemplo: 15"
                    >
                </div>
            
                <div class="col-md-3">
                    <label class="form-label fw-bold">
                        Fecha de la reunión actual
                    </label>
                
                    <input
                        id="fecha_reunion"
                        type="date"
                        class="form-control"
                    >

                    <small class="text-muted">
                        Día en que se realiza esta reunión.
                    </small>
                </div>
            
                <div class="col-md-6">
                    <label class="form-label fw-bold">
                        Tema de la reunión
                    </label>
                
                    <input
                        id="tema_habilidad_blanda"
                        class="form-control"
                        placeholder="Ejemplo: Avance de proyectos"
                    >
                </div>
            
                <div class="col-md-4">
                    <label class="form-label fw-bold">
                        Fecha de la próxima reunión
                    </label>
                
                    <input
                        id="fecha_proxima_reunion"
                        type="date"
                        class="form-control"
                    >

                    <small class="text-muted">
                        Fecha acordada para la siguiente reunión.
                    </small>
                </div>
            
                <div class="col-md-3">
                    <label class="form-label fw-bold">
                        Hora de la próxima reunión
                    </label>
                
                    <input
                        id="hora_proxima_reunion"
                        type="time"
                        class="form-control"
                    >
                </div>
            
                <div>
                    <button
                        class="btn btn-primary w-100"
                        onclick="crearReunion()"
                    >
                        Guardar reunión
                    </button>
                </div>
            
            </div>
        
        </div>
        </section>
        
        <section class="panel-card2 mt-4">
            <div>
            <h5 class="mb-3">Historial de reuniones</h5>

            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Reunión</th>
                        <th>Fecha</th>
                        <th>Tema</th>
                        <th>Próxima</th>
                        <th>Hora</th>
                        <th>Estatus</th>
                        <th>Detalle</th>
                        <th>Cancelar</th>
                    </tr>
                </thead>

                <tbody id="tablaReuniones"></tbody>
            </table>
        </div>
        </section>

        
    </main>
</div>
<script src="js/main.js"></script>
<script src="js/reuniones.js"></script>
</body>
</html>
