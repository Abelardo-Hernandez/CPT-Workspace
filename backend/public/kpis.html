<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPI's</title>

<link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
<link href="vendor/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
<div class="layout">

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">
                <i class="bi bi-bar-chart-line-fill"></i>
            </div>
            <div>
                <h4>Seguimiento</h4>
                <span>de Proyectos</span>
            </div>
        </div>

        <p class="menu-title">Navegación</p>

        <a id="menuDashboard" href="dashboard.html">
            <i class="bi bi-house-door-fill"></i> Dashboard
        </a>
        <a id="menuProyectos" href="proyectos.html">
            <i class="bi bi-folder-fill"></i> Proyectos
        </a>
        <a id="menuKPIs" href="kpis.html">
            <i class="bi bi-graph-up"></i> KPIs
        </a>
        <a id="menuReuniones" href="reuniones.html">
            <i class="bi bi-calendar-event-fill"></i> Reuniones
        </a>
        <a id="menuAreas" href="areas.html">
            <i class="bi bi-building-fill"></i> Áreas
        </a>
        <a id="menuUsuarios" href="usuarios.html">
            <i class="bi bi-people-fill"></i> Usuarios
        </a>
        <a class="logout" href="#" onclick="logout()">
            <i class="bi bi-box-arrow-left"></i> Salir
        </a>
    </aside>

    <main class="content">

        <header class="topbar">
            <div>
                <h2>KPI'S</h2>
            </div>

            <div class="topbar-right">
                <i class="bi bi-calendar3"></i>
                <span id="fechaActual"></span>
            </div>
        </header>

        <section class="panel-card2 mt-4">
            <h5 class="mb-3">Nuevo KPI</h5>

            <div class="row g-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Nombre KPI</label>
                    <input id="nombre" class="form-control" placeholder="Ejemplo: Calidad">
                </div>

                <div class="col-md-2">
                    <label class="form-label fw-bold">Unidad</label>
                    <input id="unidad" class="form-control" placeholder="%">
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-bold">Tipo de meta</label>
                    <select id="tipo_meta" class="form-select">
                        <option value="mayor_es_mejor">Mayor es mejor</option>
                        <option value="menor_es_mejor">Menor es mejor</option>
                    </select>
                </div>

                <div class="col-md-3 d-flex align-items-end">
                    <button class="btn btn-primary w-100" onclick="crearKpi()">
                        Guardar KPI
                    </button>
                </div>
            </div>
        </section>

        <section class="panel-card2 mt-4">
            <h5 class="mb-3">Lista de KPI's</h5>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th>KPI</th>
                            <th>Unidad</th>
                            <th>Tipo de meta</th>
                            <th>Activo</th>
                            <th class="text-center">Eliminar</th>
                        </tr>
                    </thead>

                    <tbody id="tablaKpis"></tbody>
                </table>
            </div>
        </section>

    </main>
</div>
<script src="js/main.js"></script>
<script src="js/kpis.js"></script>
</body>
</html>
