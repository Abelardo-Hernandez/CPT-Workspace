<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados KPI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
<div class="layout">

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">
                <i class="bi bi-bar-chart-line-fill"></i>
            </div>
            <div>
                <h4>Seguimiento</h4>
                <span>de Proyectos</span>
            </div>
        </div>

        <p class="menu-title">Navegación</p>

        <a id="menuDashboard" href="dashboard.html">
            <i class="bi bi-house-door-fill"></i> Dashboard
        </a>
        <a id="menuProyectos" href="proyectos.html">
            <i class="bi bi-folder-fill"></i> Proyectos
        </a>
        <a id="menuKPIs" href="kpis.html">
            <i class="bi bi-graph-up"></i> KPIs
        </a>
        <a id="menuReuniones" href="reuniones.html">
            <i class="bi bi-calendar-event-fill"></i> Reuniones
        </a>
        <a id="menuAreas" href="areas.html">
            <i class="bi bi-building-fill"></i> Áreas
        </a>
        <a id="menuUsuarios" href="usuarios.html">
            <i class="bi bi-people-fill"></i> Usuarios
        </a>
        <a class="logout" href="#" onclick="logout()">
            <i class="bi bi-box-arrow-left"></i> Salir
        </a>
    </aside>

    <main class="content">
        <h2>Resultados KPI por Proyecto</h2>

        <div class="card resumen-card mt-4">
            <h5 class="mb-3">Nuevo resultado KPI</h5>

            <div class="row g-3">
                <div class="col-md-3">
                    <label class="form-label fw-bold">Proyecto</label>
                    <select id="proyecto_id" class="form-select"></select>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-bold">KPI</label>
                    <select id="kpi_id" class="form-select"></select>
                </div>

                <div class="col-md-2">
                    <label class="form-label fw-bold">Meta</label>
                    <input id="meta" type="number" step="0.01" class="form-control">
                </div>

                <div class="col-md-2">
                    <label class="form-label fw-bold">Actual</label>
                    <input id="actual" type="number" step="0.01" class="form-control">
                </div>

                <div class="col-md-2">
                    <label class="form-label fw-bold">Tendencia</label>
                    <select id="tendencia" class="form-select">
                        <option value="sube">Sube</option>
                        <option value="baja">Baja</option>
                        <option value="igual" selected>Igual</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <button class="btn btn-primary w-100" onclick="crearResultadoKpi()">
                        Guardar resultado
                    </button>
                </div>
            </div>
        </div>

        <div class="card resumen-card mt-4">
            <h5 class="mb-3">Historial de resultados KPI</h5>

            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>Proyecto</th>
                        <th>KPI</th>
                        <th>Meta</th>
                        <th>Actual</th>
                        <th>Resultado</th>
                        <th>Tendencia</th>
                    </tr>
                </thead>

                <tbody id="tablaResultadosKpi"></tbody>
            </table>
        </div>
    </main>
</div>

<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/resultados-kpis.js"></script>
</body>
</html>
