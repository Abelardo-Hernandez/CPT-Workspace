<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Areas</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
<div class="layout">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon">
                <i class="bi bi-bar-chart-line-fill"></i>
            </div>
            <div>
                <h4>Seguimiento</h4>
                <span>de Proyectos</span>
            </div>
        </div>

        <p class="menu-title">Navegación</p>

        <a id="menuDashboard" href="dashboard.html">
            <i class="bi bi-house-door-fill"></i> Dashboard
        </a>
        <a id="menuProyectos" href="proyectos.html">
            <i class="bi bi-folder-fill"></i> Proyectos
        </a>
        <a id="menuKPIs" href="kpis.html">
            <i class="bi bi-graph-up"></i> KPIs
        </a>
        <a id="menuReuniones" href="reuniones.html">
            <i class="bi bi-calendar-event-fill"></i> Reuniones
        </a>
        <a id="menuAreas" href="areas.html">
            <i class="bi bi-building-fill"></i> Áreas
        </a>
        <a id="menuUsuarios" href="usuarios.html">
            <i class="bi bi-people-fill"></i> Usuarios
        </a>
        <a class="logout" href="#" onclick="logout()">
            <i class="bi bi-box-arrow-left"></i> Salir
        </a>
    </aside>

    <main class="content">
        <header class="topbar">
            <div>
                <h2>AREAS</h2>
            </div>

            <div class="topbar-right">
                <i class="bi bi-calendar3"></i>
                <span id="fechaActual"></span>
            </div>
        </header>

        <section class="panel-card2 mt-4">
            <h5 class="mb-3">Nueva area</h5>

            <div class="row g-3">
                <div class="col-md-6">
                    <input id="nombreArea" class="form-control" placeholder="Nueva area">
                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary w-100" onclick="crearArea()">
                        Guardar
                    </button>
                </div>
            </div>
        </section>

        <section class="panel-card2 mt-4">
            <h5 class="mb-3">Lista de areas</h5>

            <div class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Area</th>
                            <th class="text-center">Eliminar</th>
                        </tr>
                    </thead>

                    <tbody id="tablaAreas"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>
<script src="js/main.js"></script>
<script src="js/areas.js"></script>

</body>
</html>
